name: Publish podcast feed

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:

env:
  # The live URL of the published feed. Used to fetch history during generation.
  LIVE_FEED_URL: "https://dev.diffraction.pt/rtp-podcaster/p254_feed.xml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Fetch previously published feed
        run: |
          mkdir -p public/rtp-podcaster
          curl -f -s -o public/rtp-podcaster/p254_feed.xml ${{ env.LIVE_FEED_URL }} || echo "No previous feed found, starting fresh."

      - name: Generate podcast feed
        run: |
          mkdir -p public/rtp-podcaster
          uv run rtp-podcaster --output p254_feed.xml

      - name: Upload RSS feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-feed
          path: public/rtp-podcaster/p254_feed.xml
          retention-days: 30

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}rtp-podcaster/p254_feed.xml
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
