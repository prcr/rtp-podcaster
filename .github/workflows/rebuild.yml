name: Force rebuild podcast feed

on:
  workflow_dispatch:

env:
  # The live URL of the published feed. Used to maintain structure parameters natively.
  LIVE_FEED_URL: "https://dev.diffraction.pt/rtp-podcaster/p254_feed.xml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Generate podcast feed explicitly cleanly
        run: |
          mkdir -p public/rtp-podcaster
          # Generate completely cleanly natively dismissing local/remote payloads implicitly
          uv run rtp-podcaster --force-refresh --output p254_feed.xml

      - name: Upload RSS feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-feed
          path: public/rtp-podcaster/p254_feed.xml
          retention-days: 30

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}rtp-podcaster/p254_feed.xml
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
